---

# List of program to install
program_list:
    - sysv-rc
    - neovim
    - curl
    - zsh
    - git
    - build-essential
    - cmake
    - python3-dev
    - python-pip
    - python3-pip
    - tmux
    - neofetch
    - neomutt
    - w3m
    - ruby-full
    - nodejs
    - npm

# File/Folders paths
config_path: $HOME/.config
dotfiles_path: $HOME/.dotfiles

# ZSH
zsh_folder: $HOME/.config/zsh
default_ohmyzsh: $HOME/.oh-my-zsh
ohmyzsh_path: $HOME/.config/oh-my-zsh

# ZSHRC
zshrc_link: $HOME/.config/zsh/.zshrc
zshrc_file: $HOME/.dotfiles/.zshrc
zshrc_default: $HOME/.zshrc

# ZSHENV
zshenv_file: $HOME/.dotfiles/.zshenv
zshenv_link: $HOME/.zshenv

# ZSH PLUGINS
zsh_syntax_highlighting_path: $HOME/.config/oh-my-zsh/custom/plugins/zsh-syntax-highlighting
zsh_syntax_highlighting_repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
zsh_zsh_z_repo: "https://github.com/agkozak/zsh-z"
zsh_zsh_z_path: $HOME/.config/oh-my-zsh/custom/plugins/zsh-z

# TMUX
tmux_folder: $HOME/.config/tmux
tmux_conf_file: $HOME/.dotfiles/.tmux.conf
tmux_conf_link: $HOME/.config/tmux/.tmux.conf

# Github repos
dotfiles_repo: "https://github.com/probakilla/dotfiles.git"

# VIM
vim_folder: $HOME/.config/vim

# VUNDLE
vundle_path: $HOME/.config/vim/bundle/Vundle.vim
vim_bundle_folder: $HOME/.config/vim/bundle
vundle_repo: "https://github.com/VundleVim/Vundle.vim.git"

# YCM
ycm_script: $HOME/.config/vim/bundle/YouCompleteMe/install.py

# PYBIN
pybin_folder: $HOME/.local/pybin
pybin_repo: "https://github.com/probakilla/pybin.git"

# SCRIPTS
scripts_folder: $HOME/.local/scripts
scripts_repo: "https://github.com/probakilla/bin.git"

# INIT
init_script_name: update_repos
init_script_location: /usr/bin/update_repos
